name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/karppimc/kubernetes-task/backend
  FRONTEND_IMAGE: ghcr.io/karppimc/kubernetes-task/frontend

jobs:
  # ----------------------------------------------------------------
  # Job 1: Build Docker images for ARM64 and push to GitHub Registry
  # Runs on GitHub-hosted runner (cross-compiles for Raspberry Pi)
  # ----------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # QEMU allows building ARM64 images on the x86 GitHub runner
      - name: Set up QEMU (for ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------
  # Job 2: Deploy to Raspberry Pi
  # Runs on the self-hosted runner installed on the Pi itself
  # No public IP needed - the Pi connects outbound to GitHub
  # ----------------------------------------------------------------
  deploy:
    name: Deploy to Pi
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull new images (containerd / k3s)
        run: |
          sudo k3s crictl pull ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          sudo k3s crictl pull ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Update deployments to new image SHA
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Wait for rollouts to complete
        run: |
          kubectl rollout status deployment/backend --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s

      - name: Verify pods are running
        run: kubectl get pods
