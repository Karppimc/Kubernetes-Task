# TEMPLATE - Copy this to secret.yaml and fill in your values.
# secret.yaml is in .gitignore and will NOT be committed to git.
#
# To create the secret, either:
#   1. Copy to secret.yaml, set your values, then: kubectl apply -f secret.yaml
#   2. Or use kubectl directly:
#      kubectl create secret generic postgres-secret \
#        --from-literal=POSTGRES_USER=youruser \
#        --from-literal=POSTGRES_PASSWORD=yourpassword \
#        --from-literal=POSTGRES_DB=taskdb
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: your-db-user
  POSTGRES_PASSWORD: your-strong-password
  POSTGRES_DB: taskdb
