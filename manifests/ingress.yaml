apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-tracker-ingress
  annotations:
    # For k3s with Traefik (default ingress controller on Pi)
    # If using nginx ingress controller, change to: kubernetes.io/ingress.class: "nginx"
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
    - http:
        paths:
          # API calls go to backend service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3010
          # Everything else goes to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
