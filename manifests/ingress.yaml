apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-tracker-ingress
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          # API calls go to backend service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3010
          # Everything else goes to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
